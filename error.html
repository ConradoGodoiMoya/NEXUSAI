<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Erro {{ code }}</title>
  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#0b1020;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:24px;
    }
    .box{
      width:100%;
      max-width:560px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:28px;
      text-align:center;
    }
    h1{margin:0 0 12px;font-size:40px}
    p{margin:0;color:#cbd5e1}
    a{
      display:inline-block;
      margin-top:18px;
      padding:12px 18px;
      border-radius:12px;
      text-decoration:none;
      background:#4f46e5;
      color:#fff;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Erro {{ code }}</h1>
    <p>{{ message }}</p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
