<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#040713;
      color:#eef4ff;
      font-family:Inter, Arial, sans-serif;
    }
    .box{
      text-align:center;
      padding:32px;
      border-radius:20px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
    }
    a{
      color:#7cd4ff;
      text-decoration:none;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Página não encontrada.</p>
    <a href="/">Voltar para a home</a>
  </div>
</body>
</html>
