{% extends "base.html" %}
{% block title %}Preview IA{% endblock %}
{% block content %}

<style>
  .tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .tabBtn{cursor:pointer}
  .tabPane{display:none}
  .tabPane.show{display:block}
  .screenWrap{
    margin-top:14px;
    border:1px solid var(--border);
    border-radius:20px;
    overflow:hidden;
    background:#0a0f1e;
    box-shadow:var(--shadow);
  }
  .screenTop{
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    background:rgba(255,255,255,.04);
    display:flex;
    gap:8px;
    align-items:center;
  }
  .dot{width:12px;height:12px;border-radius:999px;background:rgba(255,255,255,.18)}
  .monitor{
    width:100%;
    height:720px;
    border:0;
    background:#fff;
    display:block;
  }
  .codeGrid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
    margin-top:14px;
  }
  .codeArea{
    min-height:220px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Courier New",monospace;
    font-size:13px;
    line-height:1.55;
  }
</style>

<div class="hero">
  <h1>Preview da IA</h1>
  <p>Veja a IA em tela separada, edite o código da preview e ajuste o comportamento quando quiser.</p>

  <div class="actions">
    <a class="btn" href="/agents">Voltar</a>
    <a class="btn" href="/agents/{{ agent.id }}/edit">Editar comportamento</a>
    <a class="btn primary" href="/agents/{{ agent.id }}/play">Testar IA</a>
  </div>

  <div class="tabs">
    <button class="btn tabBtn" type="button" data-tab="view">Visualização</button>
    <button class="btn tabBtn" type="button" data-tab="code">Código</button>
  </div>
</div>

<div id="tab-view" class="tabPane show">
  <div class="screenWrap">
    <div class="screenTop">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <span style="margin-left:8px;color:var(--muted);font-size:13px;">Tela da IA</span>
    </div>
    <iframe id="previewFrame" class="monitor"></iframe>
  </div>
</div>

<div id="tab-code" class="tabPane">
  <div class="panel">
    <form method="post" action="/builder/ai-preview/{{ agent.id }}/save">
      <label for="preview_html">HTML</label>
      <textarea id="preview_html" name="preview_html" class="codeArea">{{ result_json.preview_html or "" }}</textarea>

      <label for="preview_css">CSS</label>
      <textarea id="preview_css" name="preview_css" class="codeArea">{{ result_json.preview_css or "" }}</textarea>

      <label for="preview_js">JS</label>
      <textarea id="preview_js" name="preview_js" class="codeArea">{{ result_json.preview_js or "" }}</textarea>

      <div class="actions">
        <button class="btn primary" type="submit">Salvar código</button>
      </div>
    </form>
  </div>
</div>

<script>
  const panes = document.querySelectorAll(".tabPane");
  document.querySelectorAll(".tabBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const key = btn.getAttribute("data-tab");
      panes.forEach(p => p.classList.remove("show"));
      document.getElementById("tab-" + key).classList.add("show");
    });
  });

  const html = {{ (result_json.preview_html or "")|tojson }};
  const css = {{ (result_json.preview_css or "")|tojson }};
  const js = {{ (result_json.preview_js or "")|tojson }};

  const srcdoc = `
    <!doctype html>
    <html>
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>${css}</style>
      </head>
      <body>
        ${html}
        <script>${js}<\/script>
      </body>
    </html>
  `;
  document.getElementById("previewFrame").srcdoc = srcdoc;
</script>

{% endblock %}
